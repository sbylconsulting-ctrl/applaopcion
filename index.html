<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Opción Producciones</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0A0A0F;
      --surface: #111118;
      --surface-alt: #16161F;
      --card: #1A1A24;
      --border: #2A2A3A;
      --border-light: #35354A;
      --text: #EEEEF4;
      --text-muted: #9090AA;
      --text-dim: #606078;
      --cyan: #6EC8E4;
      --cyan-dim: rgba(110, 200, 228, 0.12);
      --pink: #E85DA0;
      --pink-dim: rgba(232, 93, 160, 0.12);
      --yellow: #E8D44C;
      --yellow-dim: rgba(232, 212, 76, 0.12);
      --success: #4ADE80;
      --success-dim: rgba(74, 222, 128, 0.10);
      --danger: #F87171;
      --danger-dim: rgba(248, 113, 113, 0.10);
      --purple: #A78BFA;
      --purple-dim: rgba(167, 139, 250, 0.10);
      --warn: #FBBF24;
      --warn-dim: rgba(251, 191, 36, 0.10);
      --sidebar: 230px;
      --radius: 14px;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', 'Segoe UI', sans-serif; }
    body { min-height: 100vh; }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; }

    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      z-index: 30;
    }
    .sidebar-header {
      padding: 18px 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap svg { max-width: 100%; height: auto; }
    .nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
    .nav-btn {
      width: 100%; border: none; background: transparent; color: var(--text-muted);
      border-radius: 8px; padding: 10px 13px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: .15s; text-align: left; margin-bottom: 2px;
    }
    .nav-btn:hover { background: var(--surface-alt); }
    .nav-btn.active { background: var(--cyan-dim); color: var(--cyan); font-weight: 700; }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 14px; }
    .role-box { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
    .role-pill {
      width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center;
      font-size: 12px; font-weight: 800;
    }
    .main {
      margin-left: var(--sidebar);
      flex: 1;
      padding: 28px 36px;
      min-width: 0;
    }

    .page-title { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; margin: 0; }
    .page-subtitle { color: var(--text-muted); font-size: 13px; margin: 4px 0 0; }
    .section-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-kpis { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .card h3 { margin: 0 0 14px; font-family: 'Outfit', sans-serif; font-size: 15px; }
    .muted { color: var(--text-muted); }
    .dim { color: var(--text-dim); }
    .success { color: var(--success); }
    .danger { color: var(--danger); }
    .cyan { color: var(--cyan); }
    .pink { color: var(--pink); }
    .yellow { color: var(--yellow); }
    .purple { color: var(--purple); }

    .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; }
    .kpi-value { margin-top: 8px; font-size: 24px; font-family: 'Outfit', sans-serif; font-weight: 800; }
    .kpi-sub { margin-top: 4px; font-size: 11px; color: var(--text-dim); }

    .btn {
      border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; transition: .15s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--cyan); color: #0A0A0F; }
    .btn-secondary { background: var(--surface-alt); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger-dim); color: var(--danger); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-sm { padding: 6px 10px; font-size: 12px; }

    .badge {
      display: inline-flex; align-items: center; justify-content: center; padding: 3px 9px;
      border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .3px;
    }

    .field { margin-bottom: 12px; }
    .field label {
      display: block; margin-bottom: 4px; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .5px; font-weight: 700;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 9px 11px; background: var(--surface-alt); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; outline: none;
    }
    .field textarea { min-height: 72px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--cyan); }
    .field-error { margin-top: 4px; font-size: 11px; color: var(--danger); }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      padding: 11px 14px; text-align: left; color: var(--text-dim);
      font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr:hover { background: var(--surface-alt); }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { width: 100px; flex-shrink: 0; color: var(--text-muted); font-size: 11px; }
    .bar-track { flex: 1; height: 8px; background: var(--surface-alt); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; }
    .bar-value { min-width: 80px; text-align: right; font-size: 12px; font-weight: 700; }

    .list-lines { display: flex; flex-direction: column; gap: 8px; }
    .line-item {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .line-item:last-child { border-bottom: 0; }

    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, var(--cyan-dim) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, var(--pink-dim) 0%, transparent 50%), var(--bg);
      padding: 20px;
    }
    .login-box { width: 100%; max-width: 440px; text-align: center; }
    .login-choice {
      width: 100%; text-align: left; padding: 16px 18px; border-radius: 12px; cursor: pointer;
      transition: .15s; border: 1px solid var(--border); background: var(--surface-alt); color: var(--text);
      margin-bottom: 10px;
    }
    .login-choice.admin { background: var(--pink-dim); border-color: rgba(232,93,160,.25); }
    .login-choice:hover { transform: translateY(-1px); }

    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }

    .toast {
      position: fixed; top: 18px; right: 18px; z-index: 100;
      padding: 12px 16px; border-radius: 10px; background: var(--card);
      border: 1px solid var(--border); box-shadow: var(--shadow); font-size: 13px;
    }
    .toast.success { border-color: rgba(74,222,128,.3); color: var(--success); }
    .toast.error { border-color: rgba(248,113,113,.3); color: var(--danger); }
    .toast.warn { border-color: rgba(251,191,36,.3); color: var(--warn); }

    .empty { text-align: center; color: var(--text-dim); padding: 30px 10px; }
    .summary-box { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .small { font-size: 12px; }

    @media (max-width: 1100px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      :root { --sidebar: 0px; }
      .sidebar { position: static; width: 100%; min-height: auto; }
      .app { flex-direction: column; }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const state = {
      role: null,
      view: 'dashboard',
      selectedId: null,
      search: '',
      toast: null,
      toastTimer: null,
      adminTab: 'platforms',
      reportsTab: 'overview',
      reportFilters: { workId: '', venueId: '', from: '', to: '' },
      newShow: null,
      editShow: null,
      settingsDraft: null,
      summaryMonth: '',
      data: {
        platforms: [
          { id: 'p1', name: 'Atrápalo', commission: 10, ivaOnCommission: true, active: true },
          { id: 'p2', name: 'Fever', commission: 20, ivaOnCommission: false, active: true },
          { id: 'p3', name: 'Kultur', commission: 13, ivaOnCommission: true, active: true },
          { id: 'p4', name: 'Abonoteatro', commission: 0, ivaOnCommission: false, active: true },
          { id: 'p5', name: 'Laopcion', commission: 5, ivaOnCommission: true, active: true },
          { id: 'p6', name: 'Universe', commission: 10, ivaOnCommission: true, active: true },
        ],
        venues: [
          { id: 'v1', name: 'Teatro Lara', active: true },
          { id: 'v2', name: 'Sala Mirador', active: true },
          { id: 'v3', name: 'Teatro Alfil', active: true },
          { id: 'v4', name: 'La Escalera de Jacob', active: true },
        ],
        works: [
          { id: 'w1', name: 'El Último Aplauso', active: true },
          { id: 'w2', name: 'Noches de Impro', active: true },
          { id: 'w3', name: 'Microteatro: Silencio', active: true },
          { id: 'w4', name: 'Stand-up Comedy Night', active: true },
          { id: 'w5', name: 'El Gran Bingo Drag', active: true },
        ],
        expenseTypes: [
          { id: 'et1', name: 'Autor', active: true },
          { id: 'et2', name: 'Alquiler', active: true },
          { id: 'et3', name: 'Otros gastos', active: true },
        ],
        agreements: [
          { id: 'at1', name: '50% Taquilla', mode: 'percentage', value: 50, active: true },
          { id: 'at2', name: '60% Taquilla', mode: 'percentage', value: 60, active: true },
          { id: 'at3', name: 'Caché 50€', mode: 'fixed', value: 50, active: true },
          { id: 'at4', name: 'Caché 100€', mode: 'fixed', value: 100, active: true },
          { id: 'at5', name: 'Caché 400€', mode: 'fixed', value: 400, active: true },
        ],
        shows: [
          { id: 's1', venueId: 'v1', workId: 'w1', venueName: 'Teatro Lara', workName: 'El Último Aplauso', date: '2026-02-07', time: '20:00', agreementId: 'at1', agreementSnapshot: { name: '50% Taquilla', mode: 'percentage', value: 50 }, notes: 'Estreno', income: { p1: 1200, p2: 850, p3: 400, p4: 0, p5: 300, p6: 200, cashBox: 600, cardBox: 450 }, platformSnapshots: { p1: { name: 'Atrápalo', commission: 10, ivaOnCommission: true, income: 1200 }, p2: { name: 'Fever', commission: 20, ivaOnCommission: false, income: 850 }, p3: { name: 'Kultur', commission: 13, ivaOnCommission: true, income: 400 }, p4: { name: 'Abonoteatro', commission: 0, ivaOnCommission: false, income: 0 }, p5: { name: 'Laopcion', commission: 5, ivaOnCommission: true, income: 300 }, p6: { name: 'Universe', commission: 10, ivaOnCommission: true, income: 200 } }, expenses: [{ typeId: 'et1', typeName: 'Autor', amount: 200 }, { typeId: 'et2', typeName: 'Alquiler', amount: 350 }], status: { ticketsSent: true, emailSent: true, invoiceSent: false, sentToAdmin: false, paymentDate: '' } },
          { id: 's2', venueId: 'v2', workId: 'w2', venueName: 'Sala Mirador', workName: 'Noches de Impro', date: '2026-02-14', time: '21:30', agreementId: 'at2', agreementSnapshot: { name: '60% Taquilla', mode: 'percentage', value: 60 }, notes: '', income: { p1: 500, p2: 1600, p3: 0, p4: 200, p5: 0, p6: 100, cashBox: 300, cardBox: 250 }, platformSnapshots: { p1: { name: 'Atrápalo', commission: 10, ivaOnCommission: true, income: 500 }, p2: { name: 'Fever', commission: 20, ivaOnCommission: false, income: 1600 }, p3: { name: 'Kultur', commission: 13, ivaOnCommission: true, income: 0 }, p4: { name: 'Abonoteatro', commission: 0, ivaOnCommission: false, income: 200 }, p5: { name: 'Laopcion', commission: 5, ivaOnCommission: true, income: 0 }, p6: { name: 'Universe', commission: 10, ivaOnCommission: true, income: 100 } }, expenses: [{ typeId: 'et2', typeName: 'Alquiler', amount: 280 }], status: { ticketsSent: true, emailSent: true, invoiceSent: true, sentToAdmin: true, paymentDate: '2026-02-20' } },
          { id: 's3', venueId: 'v3', workId: 'w3', venueName: 'Teatro Alfil', workName: 'Microteatro: Silencio', date: '2026-02-21', time: '19:00', agreementId: 'at4', agreementSnapshot: { name: 'Caché 100€', mode: 'fixed', value: 100 }, notes: 'Sesión doble', income: { p1: 0, p2: 900, p3: 600, p4: 0, p5: 150, p6: 0, cashBox: 400, cardBox: 200 }, platformSnapshots: { p1: { name: 'Atrápalo', commission: 10, ivaOnCommission: true, income: 0 }, p2: { name: 'Fever', commission: 20, ivaOnCommission: false, income: 900 }, p3: { name: 'Kultur', commission: 13, ivaOnCommission: true, income: 600 }, p4: { name: 'Abonoteatro', commission: 0, ivaOnCommission: false, income: 0 }, p5: { name: 'Laopcion', commission: 5, ivaOnCommission: true, income: 150 }, p6: { name: 'Universe', commission: 10, ivaOnCommission: true, income: 0 } }, expenses: [{ typeId: 'et1', typeName: 'Autor', amount: 150 }, { typeId: 'et3', typeName: 'Otros gastos', amount: 100 }], status: { ticketsSent: true, emailSent: false, invoiceSent: false, sentToAdmin: false, paymentDate: '' } },
          { id: 's4', venueId: 'v4', workId: 'w4', venueName: 'La Escalera de Jacob', workName: 'Stand-up Comedy Night', date: '2026-02-28', time: '22:00', agreementId: 'at5', agreementSnapshot: { name: 'Caché 400€', mode: 'fixed', value: 400 }, notes: '', income: { p1: 300, p2: 0, p3: 200, p4: 500, p5: 0, p6: 350, cashBox: 800, cardBox: 600 }, platformSnapshots: { p1: { name: 'Atrápalo', commission: 10, ivaOnCommission: true, income: 300 }, p2: { name: 'Fever', commission: 20, ivaOnCommission: false, income: 0 }, p3: { name: 'Kultur', commission: 13, ivaOnCommission: true, income: 200 }, p4: { name: 'Abonoteatro', commission: 0, ivaOnCommission: false, income: 500 }, p5: { name: 'Laopcion', commission: 5, ivaOnCommission: true, income: 0 }, p6: { name: 'Universe', commission: 10, ivaOnCommission: true, income: 350 } }, expenses: [{ typeId: 'et2', typeName: 'Alquiler', amount: 400 }, { typeId: 'et3', typeName: 'Otros gastos', amount: 75 }], status: { ticketsSent: true, emailSent: true, invoiceSent: true, sentToAdmin: false, paymentDate: '' } }
        ]
      }
    };

    const app = document.getElementById('app');

    function gid() {
      return (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36)).slice(0, 8);
    }
    function fmt(n) {
      return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(Number(n || 0));
    }
    function fmtPct(n) {
      return `${Number(n || 0).toFixed(2)}%`;
    }
    function r2(n) { return Math.round(Number(n || 0) * 100) / 100; }
    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }
    function toast(message, type = 'success') {
      state.toast = { message, type };
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => { state.toast = null; render(); }, 3500);
      render();
    }

    function snapPlatforms(platforms, income) {
      const out = {};
      platforms.forEach(pl => {
        const amt = parseFloat(income[pl.id]) || 0;
        out[pl.id] = { name: pl.name, commission: pl.commission, ivaOnCommission: pl.ivaOnCommission, income: amt };
      });
      return out;
    }
    function snapAgreement(a) {
      return a ? { name: a.name, mode: a.mode, value: Number(a.value || 0) } : null;
    }
    function calcShow(show) {
      const ps = show.platformSnapshots || {};
      const inc = show.income || {};
      const agr = show.agreementSnapshot;
      const commissions = [];
      let totalPlatformIncome = 0;
      let totalCommission = 0;

      Object.entries(ps).forEach(([pid, snap]) => {
        const amt = r2(snap.income || 0);
        totalPlatformIncome += amt;
        const base = r2(amt * (snap.commission || 0) / 100);
        const iva = snap.ivaOnCommission ? r2(base * 0.21) : 0;
        const total = r2(base + iva);
        commissions.push({ id: pid, name: snap.name, income: amt, commBase: base, commIva: iva, commTotal: total });
        totalCommission += total;
      });

      const cashBox = r2(parseFloat(inc.cashBox) || 0);
      const cardBox = r2(parseFloat(inc.cardBox) || 0);
      const ventaBruta = r2(totalPlatformIncome + cashBox + cardBox);
      const ventaNeta = r2(ventaBruta / 1.10);
      const manualExp = (show.expenses || []).reduce((sum, e) => sum + r2(parseFloat(e.amount) || 0), 0);
      const totalGastos = r2(totalCommission + manualExp);
      const totalNeto = r2(ventaNeta - totalGastos);
      let cache = 0;
      if (agr) cache = agr.mode === 'percentage' ? r2(totalNeto * agr.value / 100) : r2(agr.value);
      const restanteOpcion = r2(totalNeto - cache);

      return { commissions, cashBox, cardBox, ventaBruta, ventaNeta, totalCommission: r2(totalCommission), manualExp: r2(manualExp), totalGastos, totalNeto, cache, restanteOpcion, agreement: agr };
    }
    function getShowById(id) { return state.data.shows.find(s => s.id === id) || null; }
    function saveLocal() {
      localStorage.setItem('laopcion_app_data_v1', JSON.stringify(state.data));
    }
    function loadLocal() {
      const raw = localStorage.getItem('laopcion_app_data_v1');
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.shows && parsed.platforms) state.data = parsed;
      } catch (e) {}
    }

    function selectedMonths() {
      return [...new Set(state.data.shows.map(s => s.date?.slice(0, 7)).filter(Boolean))].sort((a, b) => b.localeCompare(a));
    }

    function getDashboardTotals() {
      const cs = state.data.shows.map(s => ({ ...s, c: calcShow(s) }));
      return cs.reduce((a, s) => ({
        vb: a.vb + s.c.ventaBruta,
        vn: a.vn + s.c.ventaNeta,
        g: a.g + s.c.totalGastos,
        tn: a.tn + s.c.totalNeto,
        ca: a.ca + s.c.cache,
        ro: a.ro + s.c.restanteOpcion,
      }), { vb: 0, vn: 0, g: 0, tn: 0, ca: 0, ro: 0 });
    }

    function loginTemplate() {
      return `
        <div class="login-screen">
          <div class="login-box">
            <div class="logo-wrap" style="margin-bottom:40px">${logoSVG(220)}</div>
            <div class="card">
              <p class="page-subtitle" style="margin:0 0 22px">Gestión financiera de espectáculos</p>
              <button class="login-choice admin" onclick="actions.login('admin')">
                <div style="font-size:14px;color:var(--pink);font-weight:700;margin-bottom:3px">Administrador</div>
                <div style="font-size:11px;color:var(--text-muted)">Control total: obras, plataformas, comisiones, informes</div>
              </button>
              <button class="login-choice" onclick="actions.login('user')">
                <div style="font-size:14px;color:var(--cyan);font-weight:700;margin-bottom:3px">Usuario</div>
                <div style="font-size:11px;color:var(--text-muted)">Registro simplificado de ingresos</div>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function logoSVG(size = 200) {
      return `<svg width="${size}" height="${size * 0.55}" viewBox="0 0 340 187" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="170" y="70" text-anchor="middle" font-family="Outfit,Arial Black,sans-serif" font-size="54" font-weight="900" letter-spacing="4" fill="#EEEEF4">LA OPCIÓN</text>
        <line x1="30" y1="90" x2="310" y2="90" stroke="#6EC8E4" stroke-width="4"/>
        <line x1="30" y1="100" x2="310" y2="100" stroke="#E85DA0" stroke-width="4"/>
        <line x1="30" y1="110" x2="310" y2="110" stroke="#E8D44C" stroke-width="4"/>
        <text x="170" y="145" text-anchor="middle" font-family="Outfit,Arial,sans-serif" font-size="22" font-weight="300" letter-spacing="10" fill="#9090AA">PRODUCCIONES</text>
      </svg>`;
    }

    function badge(text, color = 'var(--cyan)', bg = 'var(--cyan-dim)') {
      return `<span class="badge" style="color:${color};background:${bg}">${esc(text)}</span>`;
    }

    function sidebarTemplate() {
      const adminItems = [
        ['dashboard', 'Dashboard'],
        ['shows', 'Funciones'],
        ['newshow', 'Nueva función'],
        ['summary', 'Resumen mensual'],
        ['reports', 'Informes'],
        ['admin', 'Administración']
      ];
      const userItems = [
        ['dashboard', 'Dashboard'],
        ['shows', 'Funciones'],
        ['newshow', 'Registrar ingreso']

    function dashboardTemplate() {
      const shows = state.data.shows.map(s => ({ ...s, c: calcShow(s) }));
      const t = getDashboardTotals();
      const platformMap = {};
      shows.forEach(s => s.c.commissions.forEach(c => { platformMap[c.name] = (platformMap[c.name] || 0) + c.income; }));
      const taq = shows.reduce((sum, s) => sum + s.c.cashBox + s.c.cardBox, 0);
      const platformEntries = Object.entries(platformMap).sort((a,b) => b[1]-a[1]);
      const max = Math.max(1, taq, ...platformEntries.map(([,v]) => v));
      const monthly = {};
      shows.forEach(s => {
        const m = s.date?.slice(0,7) || '?';
        if (!monthly[m]) monthly[m] = { vb: 0, ro: 0, n: 0 };
        monthly[m].vb += s.c.ventaBruta;
        monthly[m].ro += s.c.restanteOpcion;
        monthly[m].n += 1;
      });
      const latest = [...shows].sort((a,b) => (b.date || '').localeCompare(a.date || ''));
      return `
        <div>
          <div style="margin-bottom:24px">
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Resumen financiero · La Opción Producciones</p>
          </div>

          <div class="grid grid-kpis" style="margin-bottom:24px">
            ${kpi('Venta Bruta', fmt(t.vb), `${shows.length} funciones`, 'var(--cyan)')}
            ${kpi('Venta Neta', fmt(t.vn), '', 'var(--purple)')}
            ${kpi('Total Gastos', fmt(t.g), '', 'var(--danger)')}
            ${kpi('Total Neto', fmt(t.tn), '', 'var(--yellow)')}
            ${kpi('Caché Salas', fmt(t.ca), '', 'var(--pink)')}
            ${kpi('Restante La Opción', fmt(t.ro), '', 'var(--success)')}
          </div>

          <div class="grid grid-2" style="margin-bottom:24px">
            <div class="card">
              <h3>Ventas por plataforma</h3>
              ${platformEntries.map(([name, value]) => barRow(name, value, max, 'var(--cyan)')).join('')}
              ${barRow('Taquilla', taq, max, 'var(--success)')}
            </div>
            <div class="card">
              <h3>Resumen mensual</h3>
              <div class="list-lines">
                ${Object.entries(monthly).sort((a,b) => b[0].localeCompare(a[0])).map(([m, d]) => `
                  <div class="line-item">
                    <div>
                      <div style="font-weight:700">${esc(m)}</div>
                      <div class="dim small">${d.n} función${d.n > 1 ? 'es' : ''}</div>
                    </div>
                    <div style="text-align:right">
                      <div class="success" style="font-weight:700">${fmt(d.ro)}</div>
                      <div class="dim small">de ${fmt(d.vb)} brutos</div>
                    </div>
                  </div>
                `).join('') || '<div class="empty">Sin datos</div>'}
              </div>
            </div>
          </div>

          <div class="card">
            <h3>Últimas funciones</h3>
            ${table([
              'Fecha','Obra','Sala','V.Bruta','T.Neto','Restante','Estado'
            ], latest.map(s => {
              const done = [s.status?.ticketsSent, s.status?.emailSent, s.status?.invoiceSent, s.status?.sentToAdmin].filter(Boolean).length;
              return [
                esc(s.date),
                esc(s.workName),
                esc(s.venueName),
                fmt(s.c.ventaBruta),
                fmt(s.c.totalNeto),
                `<span style="font-weight:700;color:${s.c.restanteOpcion >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(s.c.restanteOpcion)}</span>`,
                done === 4 ? badge('4/4', 'var(--success)', 'var(--success-dim)') : badge(`${done}/4`)
              ];
            }), latest.map(s => `onclick="actions.openShow('${s.id}')"`))}
          </div>
        </div>
      `;
    }

    function kpi(label, value, sub = '', color = 'var(--cyan)') {
      return `<div class="card"><div class="kpi-label">${esc(label)}</div><div class="kpi-value" style="color:${color}">${esc(value)}</div>${sub ? `<div class="kpi-sub">${esc(sub)}</div>` : ''}</div>`;
    }

    function barRow(label, value, max, color) {
      const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
      return `<div class="bar-row"><div class="bar-label">${esc(label)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-value">${fmt(value)}</div></div>`;
    }

    function table(headers, rows, rowAttrs = []) {
      return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.length ? rows.map((cells, i) => `<tr ${rowAttrs[i] || ''}>${cells.map(c => `<td>${c}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${headers.length}" class="empty">Sin datos</td></tr>`}</tbody></table></div>`;
    }

    function monthlySummaryTemplate() {
      const months = selectedMonths();
      if (!state.summaryMonth) state.summaryMonth = months[0] || '';
      const filtered = state.data.shows.map(s => ({ ...s, c: calcShow(s) })).filter(s => s.date?.startsWith(state.summaryMonth));
      const byWork = {};
      filtered.forEach(s => {
        const k = s.workName || 'Sin obra';
        if (!byWork[k]) byWork[k] = { venue: s.venueName, work: k, ingreso: 0, coste: 0, beneficio: 0 };
        byWork[k].ingreso += s.c.totalNeto;
        byWork[k].coste += s.c.cache;
        byWork[k].beneficio += s.c.restanteOpcion;
      });
      const rows = Object.values(byWork);
      const totI = rows.reduce((s,r) => s + r.ingreso, 0);
      const totC = rows.reduce((s,r) => s + r.coste, 0);
      const totB = rows.reduce((s,r) => s + r.beneficio, 0);
      rows.forEach(r => r.pct = totB !== 0 ? r2(r.beneficio / totB * 100) : 0);
      const totPct = totI !== 0 ? r2(totB / totI * 100) : 0;
      const platformTotals = {};
      filtered.forEach(s => {
        s.c.commissions.forEach(c => platformTotals[c.name] = (platformTotals[c.name] || 0) + c.income);
        platformTotals['Taq. Efectivo'] = (platformTotals['Taq. Efectivo'] || 0) + s.c.cashBox;
        platformTotals['Taq. Tarjeta'] = (platformTotals['Taq. Tarjeta'] || 0) + s.c.cardBox;
      });
      return `
        <div>
          <h1 class="page-title">Resumen Mensual</h1>
          <p class="page-subtitle" style="margin-bottom:20px">Visión por obra y plataforma del periodo</p>
          <div class="card" style="margin-bottom:18px">
            ${formField('Mes', `<select onchange="actions.setSummaryMonth(this.value)">${months.map(m => `<option value="${esc(m)}" ${m === state.summaryMonth ? 'selected' : ''}>${esc(m)}</option>`).join('')}</select>`)}
            <div class="small dim">${filtered.length} funciones</div>
          </div>
          <div class="card" style="margin-bottom:20px">
            <h3>Resumen por obra</h3>
            ${table(['Sala','Obra','Ingreso','Coste CIA','Beneficios','%'], rows.map(r => [esc(r.venue), esc(r.work), fmt(r.ingreso), fmt(r.coste), `<span style="font-weight:700;color:${r.beneficio >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(r.beneficio)}</span>`, fmtPct(r.pct)]))}
            <div style="display:flex;justify-content:flex-end;gap:30px;padding:12px 14px 0;border-top:2px solid rgba(110,200,228,.2);margin-top:10px;font-size:12px">
              <span class="muted">TOTAL</span>
              <strong>${fmt(totI)}</strong>
              <strong>${fmt(totC)}</strong>
              <strong class="success">${fmt(totB)}</strong>
              <strong class="cyan">${fmtPct(totPct)}</strong>
            </div>
          </div>
          <div class="card">
            <h3>Resumen por plataforma</h3>
            <div class="grid grid-kpis">
              ${Object.entries(platformTotals).sort((a,b) => b[1]-a[1]).map(([name, total]) => `<div class="summary-box"><div class="small muted" style="text-transform:uppercase;font-weight:700;margin-bottom:4px">${esc(name)}</div><div style="font-family:Outfit,sans-serif;font-size:20px;font-weight:800;color:var(--cyan)">${fmt(total)}</div></div>`).join('') || '<div class="empty">Sin datos</div>'}
            </div>
          </div>
        </div>
      `;
    }

    function reportsTemplate() {
      const f = state.reportFilters;
      const cs = state.data.shows.map(s => ({ ...s, c: calcShow(s) })).filter(s => {
        if (f.workId && s.workId !== f.workId) return false;
        if (f.venueId && s.venueId !== f.venueId) return false;
        if (f.from && s.date < f.from) return false;
        if (f.to && s.date > f.to) return false;
        return true;
      });
      const t = cs.reduce((a, s) => ({ vb: a.vb+s.c.ventaBruta, vn: a.vn+s.c.ventaNeta, g: a.g+s.c.totalGastos, tn: a.tn+s.c.totalNeto, ca: a.ca+s.c.cache, ro: a.ro+s.c.restanteOpcion, n: a.n+1 }), { vb:0, vn:0, g:0, tn:0, ca:0, ro:0, n:0 });
      const bw = {}; cs.forEach(s => { const k = s.workName || '?'; if (!bw[k]) bw[k] = { name: k, vb: 0, ro: 0, n: 0 }; bw[k].vb += s.c.ventaBruta; bw[k].ro += s.c.restanteOpcion; bw[k].n++; });
      const bv = {}; cs.forEach(s => { const k = s.venueName || '?'; if (!bv[k]) bv[k] = { name: k, vb: 0, ro: 0, n: 0 }; bv[k].vb += s.c.ventaBruta; bv[k].ro += s.c.restanteOpcion; bv[k].n++; });
      const bm = {}; cs.forEach(s => { const m = s.date?.slice(0,7) || '?'; if (!bm[m]) bm[m] = { name: m, vb: 0, g: 0, ro: 0 }; bm[m].vb += s.c.ventaBruta; bm[m].g += s.c.totalGastos; bm[m].ro += s.c.restanteOpcion; });
      const pp = {}; cs.forEach(s => { s.c.commissions.forEach(c => pp[c.name] = (pp[c.name] || 0) + c.income); pp['Taquilla'] = (pp['Taquilla'] || 0) + s.c.cashBox + s.c.cardBox; });
      const workData = Object.values(bw).sort((a,b) => b.vb-a.vb);
      const venueData = Object.values(bv).sort((a,b) => b.vb-a.vb);
      const monthData = Object.values(bm).sort((a,b) => a.name.localeCompare(b.name));
      const pieData = Object.entries(pp).sort((a,b) => b[1]-a[1]);
      const maxPie = Math.max(1, ...pieData.map(([,v]) => v));
      const tabs = [['overview','Resumen'],['works','Por obra'],['venues','Por sala'],['evolution','Evolución']];
      return `
        <div>
          <h1 class="page-title">Informes</h1>
          <p class="page-subtitle" style="margin-bottom:18px">Análisis financiero con filtros</p>

          <div class="card" style="margin-bottom:18px">
            <div class="filters">
              <div style="width:180px">${formField('Obra', `<select onchange="actions.setReportFilter('workId', this.value)">${optionsFrom(state.data.works, 'id', 'name', f.workId)}</select>`)}</div>
              <div style="width:170px">${formField('Sala', `<select onchange="actions.setReportFilter('venueId', this.value)">${optionsFrom(state.data.venues, 'id', 'name', f.venueId)}</select>`)}</div>
              <div style="width:150px">${formField('Desde', `<input type="date" value="${esc(f.from)}" onchange="actions.setReportFilter('from', this.value)" />`)}</div>
              <div style="width:150px">${formField('Hasta', `<input type="date" value="${esc(f.to)}" onchange="actions.setReportFilter('to', this.value)" />`)}</div>
              <div style="padding-bottom:12px"><button class="btn btn-ghost btn-sm" onclick="actions.clearReportFilters()">Limpiar</button></div>
            </div>
          </div>

          <div class="grid grid-kpis" style="margin-bottom:20px">
            ${kpi('Funciones', t.n, '', 'var(--cyan)')}
            ${kpi('V. Bruta', fmt(t.vb), '', 'var(--purple)')}
            ${kpi('V. Neta', fmt(t.vn), '', 'var(--yellow)')}
            ${kpi('Total Gastos', fmt(t.g), '', 'var(--danger)')}
            ${kpi('Total Neto', fmt(t.tn), '', 'var(--cyan)')}
            ${kpi('Caché', fmt(t.ca), '', 'var(--pink)')}
            ${kpi('Restante', fmt(t.ro), '', 'var(--success)')}
          </div>

          <div class="top-actions" style="margin-bottom:18px">
            ${tabs.map(([id, label]) => `<button class="btn ${state.reportsTab === id ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="actions.setReportsTab('${id}')">${esc(label)}</button>`).join('')}
          </div>

          ${state.reportsTab === 'overview' ? `
            <div class="grid grid-2">
              <div class="card">
                <h3>Ingresos vs beneficio por obra</h3>
                ${workData.length ? workData.map(r => barRow(`${r.name} · Restante`, r.ro, Math.max(1, ...workData.map(x => Math.max(x.vb, x.ro))), 'var(--success)') + barRow(`${r.name} · Bruta`, r.vb, Math.max(1, ...workData.map(x => Math.max(x.vb, x.ro))), 'var(--cyan)')).join('') : '<div class="empty">Sin datos</div>'}
              </div>
              <div class="card">
                <h3>Reparto por plataforma</h3>
                ${pieData.length ? pieData.map(([name, value]) => barRow(name, value, maxPie, 'var(--cyan)')).join('') : '<div class="empty">Sin datos</div>'}
              </div>
            </div>
          ` : ''}

          ${state.reportsTab === 'works' ? table(['Obra','Func.','V.Bruta','Restante'], workData.map(r => [esc(r.name), String(r.n), fmt(r.vb), `<span style="font-weight:700;color:${r.ro >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(r.ro)}</span>`])) : ''}
          ${state.reportsTab === 'venues' ? table(['Sala','Func.','V.Bruta','Restante'], venueData.map(r => [esc(r.name), String(r.n), fmt(r.vb), `<span style="font-weight:700;color:${r.ro >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(r.ro)}</span>`])) : ''}
          ${state.reportsTab === 'evolution' ? `
            <div class="card">
              <h3>Evolución mensual</h3>
              ${monthData.length ? monthData.map(r => `
                <div style="margin-bottom:14px">
                  <div style="font-weight:700;margin-bottom:6px">${esc(r.name)}</div>
                  ${barRow('V.Bruta', r.vb, Math.max(1, ...monthData.map(x => Math.max(x.vb, x.g, x.ro))), 'var(--cyan)')}
                  ${barRow('Gastos', r.g, Math.max(1, ...monthData.map(x => Math.max(x.vb, x.g, x.ro))), 'var(--danger)')}
                  ${barRow('Restante', r.ro, Math.max(1, ...monthData.map(x => Math.max(x.vb, x.g, x.ro))), 'var(--success)')}
                </div>
              `).join('') : '<div class="empty">Sin datos</div>'}
            </div>
          ` : ''}
        </div>
      `;
    }

    function adminTemplate() {
      const tabs = [['platforms','Plataformas'],['venues','Salas'],['works','Obras'],['expenses','Gastos'],['agreements','Acuerdos'],['sync','Sync']];
      return `
        <div>
          <h1 class="page-title" style="margin-bottom:20px">Administración</h1>
          <div class="top-actions" style="margin-bottom:18px">${tabs.map(([id, label]) => `<button class="btn ${state.adminTab === id ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="actions.setAdminTab('${id}')">${esc(label)}</button>`).join('')}</div>
          ${state.adminTab === 'platforms' ? settingsTable('Plataformas', state.data.platforms, ['Nombre','Com.','IVA','Estado'], item => [esc(item.name), `${item.commission}%`, item.ivaOnCommission ? badge('Sí','var(--pink)','var(--pink-dim)') : 'No', item.active ? badge('Activa','var(--success)','var(--success-dim)') : badge('Inactiva','var(--text-dim)','var(--surface-alt)')], 'platform') : ''}
          ${state.adminTab === 'venues' ? settingsTable('Salas', state.data.venues, ['Nombre','Estado'], item => [esc(item.name), item.active ? badge('Activa','var(--success)','var(--success-dim)') : badge('Inactiva','var(--text-dim)','var(--surface-alt)')], 'venue') : ''}
          ${state.adminTab === 'works' ? settingsTable('Obras', state.data.works, ['Nombre','Funciones','Estado'], item => [esc(item.name), String(state.data.shows.filter(s => s.workId === item.id).length), item.active ? badge('Activa','var(--success)','var(--success-dim)') : badge('Inactiva','var(--text-dim)','var(--surface-alt)')], 'work') : ''}
          ${state.adminTab === 'expenses' ? settingsTable('Tipos de gasto', state.data.expenseTypes, ['Nombre','Estado'], item => [esc(item.name), item.active ? badge('Activa','var(--success)','var(--success-dim)') : badge('Inactiva','var(--text-dim)','var(--surface-alt)')], 'expenseType') : ''}
          ${state.adminTab === 'agreements' ? settingsTable('Acuerdos', state.data.agreements, ['Nombre','Tipo','Valor','Estado'], item => [esc(item.name), item.mode === 'percentage' ? badge('%') : badge('Fijo','var(--pink)','var(--pink-dim)'), item.mode === 'percentage' ? `${item.value}%` : fmt(item.value), item.active ? badge('Activo','var(--success)','var(--success-dim)') : badge('Inactivo','var(--text-dim)','var(--surface-alt)')], 'agreement') : ''}
          ${state.adminTab === 'sync' ? `<div class="card"><div style="text-align:center;padding:36px 18px">${logoSVG(100)}<h3 style="font-size:18px;margin:16px 0 6px">Google Sheets</h3><p class="page-subtitle" style="margin:0 0 10px">Exportación de datos para backup</p>${badge('Próximamente','var(--warn)','var(--warn-dim)')}</div></div>` : ''}
          ${settingsEditorTemplate()}
        </div>
      `;
    }

    function settingsTable(title, list, headers, rowMap, type) {
      return `
        <div class="card">
          <div class="section-top">
            <div><h3 style="margin:0">${esc(title)}</h3><p class="page-subtitle" style="margin-top:3px">Gestión básica</p></div>
            <button class="btn btn-primary" onclick="actions.startNewSetting('${type}')">Nuevo</button>
          </div>
          ${table([...headers, ''], list.map(item => [...rowMap(item), `<div class="top-actions"><button class="btn btn-secondary btn-sm" onclick="actions.editSetting('${type}','${item.id}')">Editar</button><button class="btn btn-danger btn-sm" onclick="actions.deleteSetting('${type}','${item.id}')">Eliminar</button></div>`]))}
        </div>
      `;
    }

    function settingsEditorTemplate() {
      if (!state.settingsDraft) return '';
      const { type, mode, item } = state.settingsDraft;
      const title = mode === 'new' ? 'Nuevo elemento' : 'Editar elemento';
      const commonName = formField('Nombre *', `<input value="${esc(item.name || '')}" oninput="actions.updateSettingDraft('name', this.value)" />`);
      let inner = commonName;
      if (type === 'platform') {
        inner += formField('Comisión (%)', `<input type="number" min="0" max="100" value="${esc(item.commission ?? 0)}" oninput="actions.updateSettingDraft('commission', this.value)" />`);
        inner += `<div class="summary-box" style="margin-bottom:12px"><label><input type="checkbox" ${item.ivaOnCommission ? 'checked' : ''} onchange="actions.toggleSettingDraft('ivaOnCommission', this.checked)" /> IVA sobre comisión (21%)</label></div>`;
      }
      if (type === 'agreement') {
        inner += formField('Tipo', `<select onchange="actions.updateSettingDraft('mode', this.value)"><option value="percentage" ${item.mode === 'percentage' ? 'selected' : ''}>Porcentaje</option><option value="fixed" ${item.mode === 'fixed' ? 'selected' : ''}>Caché fijo</option></select>`);
        inner += formField(item.mode === 'percentage' ? 'Porcentaje (%)' : 'Importe (€)', `<input type="number" min="0" value="${esc(item.value ?? 0)}" oninput="actions.updateSettingDraft('value', this.value)" />`);
      }
      inner += `<div class="summary-box" style="margin-bottom:18px"><label><input type="checkbox" ${item.active !== false ? 'checked' : ''} onchange="actions.toggleSettingDraft('active', this.checked)" /> Activo/a</label></div>`;
      inner += `<div class="top-actions"><button class="btn btn-primary" onclick="actions.saveSettingDraft()">Guardar</button><button class="btn btn-secondary" onclick="actions.cancelSettingDraft()">Cancelar</button></div>`;
      return `<div class="card" style="margin-top:18px"><h3>${title}</h3>${inner}</div>`;
    }

    function getSettingsListByType(type) {
      return {
        platform: state.data.platforms,
        venue: state.data.venues,
        work: state.data.works,
        expenseType: state.data.expenseTypes,
        agreement: state.data.agreements,
      }[type];
    }

    function setSettingsListByType(type, value) {
      const map = { platform: 'platforms', venue: 'venues', work: 'works', expenseType: 'expenseTypes', agreement: 'agreements' };
      state.data[map[type]] = value;
      saveLocal();
    }

    function contentTemplate() {
      if (!state.role) return loginTemplate();
      let viewHtml = '';
      if (state.editShow) viewHtml = editShowTemplate();
      else switch (state.view) {
        case 'dashboard': viewHtml = dashboardTemplate(); break;
        case 'shows': viewHtml = showListTemplate(); break;
        case 'newshow': viewHtml = newShowTemplate(); break;
        case 'detail': viewHtml = showDetailTemplate(); break;
        case 'summary': viewHtml = state.role === 'admin' ? monthlySummaryTemplate() : dashboardTemplate(); break;
        case 'reports': viewHtml = state.role === 'admin' ? reportsTemplate() : dashboardTemplate(); break;
        case 'admin': viewHtml = state.role === 'admin' ? adminTemplate() : dashboardTemplate(); break;
        default: viewHtml = dashboardTemplate();
      }
      return `
        <div class="app">
          ${sidebarTemplate()}
          <main class="main">${viewHtml}</main>
          ${state.toast ? `<div class="toast ${esc(state.toast.type)}">${esc(state.toast.message)}</div>` : ''}
        </div>
      `;
    }

    const actions = {
      login(role) { state.role = role; state.view = 'dashboard'; state.selectedId = null; render(); },
      logout() { state.role = null; state.view = 'dashboard'; state.selectedId = null; state.editShow = null; render(); },
      setView(view) { state.view = view; if (view !== 'newshow') state.newShow = null; state.editShow = null; render(); },
      setSearch(value) { state.search = value; render(); },
      openShow(id) { state.selectedId = id; state.view = 'detail'; state.editShow = null; render(); },
      updateNewShow(key, value) { state.newShow[key] = value; render(); },
      updateNewIncome(key, value) { state.newShow.income[key] = value; render(); },
      addNewExpense() { state.newShow.expenses.push({ typeId: '', amount: 0 }); render(); },
      updateNewExpense(index, key, value) { state.newShow.expenses[index][key] = value; render(); },
      removeNewExpense(index) { state.newShow.expenses.splice(index, 1); render(); },
      saveNewShow() {
        const d = state.newShow;
        if (!d.workId || !d.venueId || !d.date) return toast('Completa obra, sala y fecha', 'error');
        const vals = [...state.data.platforms.map(p => parseFloat(d.income?.[p.id]) || 0), parseFloat(d.income?.cashBox) || 0, parseFloat(d.income?.cardBox) || 0];
        if (vals.some(v => v < 0)) return toast('No se admiten importes negativos', 'error');
        if ((d.expenses || []).some(e => (parseFloat(e.amount) || 0) < 0)) return toast('Gastos negativos no válidos', 'error');
        if ((d.expenses || []).some(e => (parseFloat(e.amount) || 0) > 0 && !e.typeId)) return toast('Selecciona tipo de gasto', 'error');
        const inc = { ...d.income };
        state.data.platforms.forEach(p => inc[p.id] = parseFloat(inc[p.id]) || 0);
        inc.cashBox = parseFloat(inc.cashBox) || 0;
        inc.cardBox = parseFloat(inc.cardBox) || 0;
        const venue = state.data.venues.find(v => v.id === d.venueId);
        const work = state.data.works.find(w => w.id === d.workId);
        const ag = state.data.agreements.find(a => a.id === d.agreementId);
        const expenses = (d.expenses || []).filter(e => e.typeId && (parseFloat(e.amount) || 0) > 0).map(e => ({ ...e, amount: parseFloat(e.amount) || 0, typeName: state.data.expenseTypes.find(t => t.id === e.typeId)?.name || 'Gasto' }));
        const payload = { ...clone(d), income: inc, expenses, venueName: venue?.name || '', workName: work?.name || '', agreementSnapshot: snapAgreement(ag), platformSnapshots: snapPlatforms(state.data.platforms, inc) };
        state.data.shows.push(payload);
        saveLocal();
        state.newShow = null;
        state.view = 'shows';
        toast('Función guardada', 'success');
      },
      startEditShow() { const show = getShowById(state.selectedId); state.editShow = clone(show); render(); },
      cancelEditShow() { state.editShow = null; render(); },
      updateEditShow(key, value) { state.editShow[key] = value; render(); },
      updateEditIncome(key, value) { state.editShow.income[key] = value; render(); },
      addEditExpense() { state.editShow.expenses = state.editShow.expenses || []; state.editShow.expenses.push({ typeId: '', amount: 0 }); render(); },
      updateEditExpense(index, key, value) { state.editShow.expenses[index][key] = value; render(); },
      removeEditExpense(index) { state.editShow.expenses.splice(index, 1); render(); },
      saveEditedShow() {
        const ed = state.editShow;
        const inc = { ...ed.income };
        state.data.platforms.forEach(p => inc[p.id] = parseFloat(inc[p.id]) || 0);
        inc.cashBox = parseFloat(inc.cashBox) || 0;
        inc.cardBox = parseFloat(inc.cardBox) || 0;
        const expenses = (ed.expenses || []).map(e => ({ ...e, amount: parseFloat(e.amount) || 0, typeName: state.data.expenseTypes.find(t => t.id === e.typeId)?.name || e.typeName || 'Gasto' }));
        const venue = state.data.venues.find(v => v.id === ed.venueId);
        const work = state.data.works.find(w => w.id === ed.workId);
        const ag = state.data.agreements.find(a => a.id === ed.agreementId);
        const payload = { ...ed, income: inc, expenses, venueName: venue?.name || ed.venueName, workName: work?.name || ed.workName, agreementSnapshot: snapAgreement(ag) || ed.agreementSnapshot, platformSnapshots: snapPlatforms(state.data.platforms, inc) };
        state.data.shows = state.data.shows.map(s => s.id === payload.id ? payload : s);
        saveLocal();
        state.editShow = null;
        toast('Función actualizada', 'success');
      },
      toggleStatus(id, key) {
        state.data.shows = state.data.shows.map(s => s.id === id ? { ...s, status: { ...s.status, [key]: !s.status?.[key] } } : s);
        saveLocal(); render();
      },
      updatePaymentDate(id, value) {
        state.data.shows = state.data.shows.map(s => s.id === id ? { ...s, status: { ...s.status, paymentDate: value } } : s);
        saveLocal(); render();
      },
      setSummaryMonth(value) { state.summaryMonth = value; render(); },
      setReportFilter(key, value) { state.reportFilters[key] = value; render(); },
      clearReportFilters() { state.reportFilters = { workId: '', venueId: '', from: '', to: '' }; render(); },
      setReportsTab(id) { state.reportsTab = id; render(); },
      setAdminTab(id) { state.adminTab = id; state.settingsDraft = null; render(); },
      startNewSetting(type) {
        const base = { id: gid(), name: '', active: true };
        if (type === 'platform') Object.assign(base, { commission: 0, ivaOnCommission: false });
        if (type === 'agreement') Object.assign(base, { mode: 'percentage', value: 50 });
        state.settingsDraft = { type, mode: 'new', item: base };
        render();
      },
      editSetting(type, id) {
        const list = getSettingsListByType(type);
        const item = list.find(x => x.id === id);
        state.settingsDraft = { type, mode: 'edit', item: clone(item) };
        render();
      },
      updateSettingDraft(key, value) { state.settingsDraft.item[key] = (key === 'commission' || key === 'value') ? Number(value) : value; render(); },
      toggleSettingDraft(key, checked) { state.settingsDraft.item[key] = checked; render(); },
      cancelSettingDraft() { state.settingsDraft = null; render(); },
      saveSettingDraft() {
        const { type, mode, item } = state.settingsDraft;
        if (!item.name?.trim()) return toast('Introduce un nombre', 'error');
        if (type === 'platform' && (item.commission < 0 || item.commission > 100)) return toast('Comisión 0-100%', 'error');
        const list = getSettingsListByType(type);
        const dup = list.some(x => x.id !== item.id && x.name.toLowerCase().trim() === item.name.toLowerCase().trim());
        if (dup) return toast(`"${item.name}" ya existe`, 'error');
        const newList = mode === 'new' ? [...list, item] : list.map(x => x.id === item.id ? item : x);
        setSettingsListByType(type, newList);
        state.settingsDraft = null;
        toast('Elemento guardado', 'success');
      },
      deleteSetting(type, id) {
        const usage = state.data.shows.some(s => s.venueId === id || s.workId === id || s.agreementId === id || !!s.platformSnapshots?.[id] || (s.expenses || []).some(e => e.typeId === id));
        if (usage) return toast('Elemento en uso. Desactívalo en vez de borrarlo.', 'warn');
        const list = getSettingsListByType(type).filter(x => x.id !== id);
        setSettingsListByType(type, list);
        toast('Elemento eliminado', 'success');
        render();
      }
    };

    window.actions = actions;

    function render() {
      app.innerHTML = contentTemplate();
    }

    loadLocal();
    render();
  </script>
</body>
</html>
